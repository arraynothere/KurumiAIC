<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurumi AIC</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="bg"></div>
<img class="bg-img" src="https://files.catbox.moe/gnh4lc.jpg">

<div class="app">
  <header>Kurumi Tokisaki</header>

  <div class="statusBar">
  <div class="statusLeft">
    <span id="userName">@You</span>
  </div>

  <div class="statusRight">
    <span id="kurumiMood">Kurumi: Calm</span>
  </div>
</div>

<div id="popup" class="popup"></div>

  <div id="chat" class="vn-chat"></div>

  <div class="inputArea">
    <input id="input" placeholder="Talk to Kurumi...">
    <button onclick="send()"><i class="fas fa-paper-plane"></i></button>
    <button onclick="speakLast()"><i class="fas fa-volume-high"></i></button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
